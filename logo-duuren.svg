<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#C8780A"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1308"/>
      <stop offset="100%" style="stop-color:#0F0A05"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- Inner decorative ring -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#D4891A" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- Bowl shape -->
  <ellipse cx="200" cy="242" rx="72" ry="18" fill="#D4891A" opacity="0.15"/>
  <path d="M130 210 Q130 265 200 272 Q270 265 270 210 Z" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="210" x2="280" y2="210" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <!-- Bowl legs/base -->
  <path d="M165 268 Q200 278 235 268" fill="none" stroke="#D4891A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Steam lines -->
  <path d="M168 198 Q163 185 168 174 Q173 163 168 152" fill="none" stroke="#F5C842" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M200 195 Q195 180 200 168 Q205 156 200 144" fill="none" stroke="#F5C842" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M232 198 Q237 185 232 174 Q227 163 232 152" fill="none" stroke="#F5C842" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Main text: ДҮҮРЭН -->
  <text x="200" y="332" font-family="'Georgia', serif" font-size="42" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="8">ДҮҮРЭН</text>

  <!-- Subtitle -->
  <text x="200" y="358" font-family="Georgia, serif" font-size="13" fill="#A0885A" text-anchor="middle" letter-spacing="4">ДАРХАН-УУЛ АЙМАГ</text>

  <!-- Decorative dots -->
  <circle cx="100" cy="344" r="3" fill="#D4891A" opacity="0.6"/>
  <circle cx="300" cy="344" r="3" fill="#D4891A" opacity="0.6"/>
  <circle cx="88" cy="355" r="1.5" fill="#D4891A" opacity="0.4"/>
  <circle cx="312" cy="355" r="1.5" fill="#D4891A" opacity="0.4"/>

  <!-- Top decorative element -->
  <path d="M155 80 L200 62 L245 80" fill="none" stroke="#D4891A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <circle cx="200" cy="58" r="5" fill="#D4891A" opacity="0.7"/>
</svg>
